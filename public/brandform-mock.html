<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;font-family:'Inter',system-ui,Arial,sans-serif;background:linear-gradient(135deg,#eef2f7,#dbe4f0);}
.container{max-width:1100px;margin:0 auto;padding:1.5rem;}
.row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:.5rem;}
.cell{flex:1;min-width:230px;}
.btn{cursor:pointer;}
.form-label{display:block;}
.form-control,.form-select{width:100%;box-sizing:border-box;}
/* ============================================================
   Route Facile — Create/Edit Brand form (navy + orange)
   Scoped to .rf-form-page
   ============================================================ */
.rf-form-page {
  padding-top: 1.25rem;
  padding-bottom: 2rem;
}

/* ---- Page header ---- */
.rf-form-page .rf-page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
}
.rf-form-page .rf-page-title {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  font-size: 1.5rem;
  font-weight: 800;
  color: #0d1b2a;
  margin: 0;
  letter-spacing: -0.3px;
}
.rf-form-page .rf-title-bar {
  width: 6px;
  height: 26px;
  border-radius: 4px;
  background: #ff8a00;
  display: inline-block;
}
.rf-form-page .rf-page-sub {
  margin: 0.4rem 0 0 1.2rem;
  color: #8492a6;
  font-size: 0.85rem;
  font-weight: 500;
}

/* ---- Outline (Brand List) button ---- */
.rf-outline-btn {
  display: inline-flex !important;
  align-items: center;
  background: #fff !important;
  border: 1.5px solid #e2e8f0 !important;
  color: #0d1b2a !important;
  font-weight: 600 !important;
  border-radius: 12px !important;
  padding: 0.55rem 1.25rem !important;
  transition: all 0.18s ease;
}
.rf-outline-btn:hover,
.rf-outline-btn:focus {
  border-color: #ff8a00 !important;
  color: #ff8a00 !important;
  background: #fff !important;
}

/* ---- Form card ---- */
.rf-form-card {
  background: #fff;
  border-radius: 18px;
  box-shadow: 0 4px 24px rgba(13, 27, 42, 0.07);
  padding: 1.75rem 1.75rem 1.25rem;
}

/* ---- Labels & inputs ---- */
.rf-form-card .form-label {
  font-weight: 600;
  font-size: 0.82rem;
  color: #334155;
  margin-bottom: 0.4rem;
}
.rf-form-card .form-control,
.rf-form-card .form-select {
  border: 1.5px solid #e5e9f0;
  border-radius: 11px;
  padding: 0.65rem 0.9rem;
  font-size: 0.9rem;
  color: #1f2d3d;
  background: #f8fafc;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
}
.rf-form-card .form-control:focus,
.rf-form-card .form-select:focus {
  border-color: #ff8a00;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(255, 138, 0, 0.12);
}
.rf-form-card .form-control::placeholder {
  color: #b6c0cd;
}

/* File input button tint */
.rf-form-card input[type="file"]::file-selector-button {
  border: none;
  background: #0d1b2a;
  color: #fff;
  font-weight: 600;
  border-radius: 8px;
  padding: 0.4rem 0.9rem;
  margin-right: 0.9rem;
  cursor: pointer;
  transition: background 0.15s ease;
}
.rf-form-card input[type="file"]::file-selector-button:hover {
  background: #ff8a00;
}

/* Image preview frame */
.rf-form-card img[alt="Preview"] {
  border-radius: 12px;
  border: 1px solid #eef1f5;
  padding: 8px;
  background: #f7f9fc;
  object-fit: contain;
}

/* ---- Submit ---- */
.rf-form-actions {
  margin-top: 1.25rem;
  display: flex;
}
.rf-submit-btn {
  display: inline-flex !important;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-width: 150px;
  background: linear-gradient(135deg, #ff8a00, #e97c00) !important;
  border: none !important;
  color: #fff !important;
  font-weight: 600 !important;
  border-radius: 12px !important;
  padding: 0.65rem 1.6rem !important;
  box-shadow: 0 6px 18px rgba(255, 138, 0, 0.35) !important;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.rf-submit-btn:hover:not(:disabled),
.rf-submit-btn:focus:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 10px 26px rgba(255, 138, 0, 0.45) !important;
  background: linear-gradient(135deg, #ff9416, #ef8200) !important;
}

/* validation message */
.rf-form-card .custom_error {
  display: block;
  color: #ef4444;
  font-size: 0.78rem;
  margin-top: 0.3rem;
}
</style></head><body>
<div class="container">
 <div class="rf-form-page">
  <div class="rf-page-header">
    <div class="rf-page-heading">
      <h3 class="rf-page-title"><span class="rf-title-bar"></span> Add Car Brand</h3>
      <p class="rf-page-sub">Fill in the brand details below</p>
    </div>
    <button class="btn rf-outline-btn">&#8592;&nbsp; Brand List</button>
  </div>
  <form class="rf-form-card">
    <div class="row">
      <div class="cell"><label class="form-label">Status</label>
        <select class="form-select"><option>Select</option><option>Active</option></select></div>
      <div class="cell"><label class="form-label">Brand Name (English)</label>
        <input class="form-control" placeholder="e.g. Renault"></div>
      <div class="cell"><label class="form-label">Brand Name (Arabic)</label>
        <input class="form-control" placeholder="e.g. رينو"></div>
    </div>
    <div class="row">
      <div class="cell"><label class="form-label">Brand Image</label>
        <input class="form-control" type="file"></div>
      <div class="cell"></div><div class="cell"></div>
    </div>
    <div class="rf-form-actions"><button class="btn rf-submit-btn">Submit</button></div>
  </form>
 </div>
</div>
</body></html>
